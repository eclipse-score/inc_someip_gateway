# Workflow configuration for S-CORE CI - Bazel Build & Test module
# This workflow runs Bazel build and test when triggered by specific pull request events.

name: Build & Test module (with host toolchain)
on:
  workflow_call:
jobs:
  build_and_test_host:
    runs-on: ubuntu-24.04
    steps:
      - uses: eclipse-score/more-disk-space@v1
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Create Bazel output base directory
        run: |
          sudo mkdir -p /mnt/.bazel
          sudo chown -R $USER:$USER /mnt/.bazel
      - name: Create config indicator file
        run: echo "host" > .bazel_config
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          output-base: /mnt/.bazel
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}
          # Share repository cache between workflows.
          repository-cache: |
            - ./MODULE.bazel
            - ./.bazel_config
          # Cache external/
          external-cache: true
          cache-save: ${{ github.event_name == 'push' }}
      - name: Install tools needed for ITF tests
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 iputils-ping genisoimage
      - name: Allow linux-sandbox
        uses: ./.github/actions/unblock_user_namespace_for_linux_sandbox
      - run: df -h
      - name: Bazel build targets
        run: |
          bazel build //...
      - run: df -h
        if: always()
      - name: Bazel test targets
        run: |
          bazel test //... --build_tests_only
      - name: Enable KVM group permissons
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Linux QEMU integration tests
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          for attempt in 1 2 3; do
            if bazel test \
              //quality/integration_testing/test:test_hello_world \
              --//quality/integration_testing/flags:linux_backend=qemu \
              --nocache_test_results \
              --test_timeout=1200 \
              --test_output=errors; then
              break
            fi

            if [[ "$attempt" -eq 3 ]]; then
              echo "Linux QEMU integration tests failed after 3 attempts."
              exit 1
            fi

            backoff_seconds=$((attempt * 30))
            echo "Linux QEMU integration tests failed on attempt ${attempt}, retrying in ${backoff_seconds}s..."
            sleep "$backoff_seconds"
          done
      - run: df -h
        if: always()
