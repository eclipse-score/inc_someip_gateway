name: License Check

on:
  workflow_call:

permissions:
  pull-requests: write
  issues: write

jobs:
  license-check:
    uses: eclipse-score/cicd-workflows/.github/workflows/license-check.yml@0bd0be843039a465d2f485607a31e8df4268efa0
    secrets:
      dash-api-token: ${{ secrets.ECLIPSE_GITLAB_API_TOKEN }}
